name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck on install/uninstall scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          additional_files: 'install-claude-code.sh install-vscode.sh install-opencode.sh install-github-copilot-cli.sh uninstall-claude-code.sh uninstall-vscode.sh uninstall-opencode.sh uninstall-github-copilot-cli.sh'

  validate-agents:
    name: Validate agent frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all agent files have valid YAML frontmatter
        run: |
          errors=0
          for f in claude-code/agents/*.md vscode-copilot/agents/*.md opencode/agents/*.md; do
            if ! head -1 "$f" | grep -q '^---$'; then
              echo "ERROR: $f missing YAML frontmatter"
              errors=$((errors + 1))
            fi
            # Check that frontmatter closes
            if ! awk 'NR==1{if($0!="---")exit 1} NR>1&&/^---$/{found=1;exit} END{exit !found}' "$f"; then
              echo "ERROR: $f has unclosed YAML frontmatter"
              errors=$((errors + 1))
            fi
            # Check required 'description' field
            if ! sed -n '2,/^---$/p' "$f" | grep -q '^description:'; then
              echo "ERROR: $f missing 'description' in frontmatter"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "Found $errors frontmatter errors"
            exit 1
          fi
          echo "All agent files have valid frontmatter"

  validate-skill:
    name: Validate skill definition
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SKILL.md exists and has frontmatter
        run: |
          skill="plugins/dev-workflow-agents/skills/dev-workflow/SKILL.md"
          if [ ! -f "$skill" ]; then
            echo "ERROR: $skill not found"
            exit 1
          fi
          if ! head -1 "$skill" | grep -q '^---$'; then
            echo "ERROR: $skill missing YAML frontmatter"
            exit 1
          fi
          echo "Skill definition is valid"
